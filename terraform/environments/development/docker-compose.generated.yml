# Generated by Terraform — do not edit manually
# Environment: development
# To regenerate: cd terraform/environments/development && terraform apply

services:
  db:
    image: postgres:15-alpine
    container_name: memberhub_development_db
    environment:
      POSTGRES_USER: memberhub_user
      POSTGRES_PASSWORD: dev_password_123
      POSTGRES_DB: memberhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: memberhub_development_redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ../../../backend
    container_name: memberhub_development_backend
    depends_on: [db, redis]
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://memberhub_user:dev_password_123@db:5432/memberhub
      REDIS_HOST: redis
      LOG_LEVEL: debug
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ../../../
    container_name: memberhub_development_frontend
    depends_on: [backend]
    ports:
      - "8080:80"

volumes:
  postgres_data:
