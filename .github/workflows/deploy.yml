name: Deploy to Render

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Backend to Render
        run: |
          curl -s --request POST \
            --url "https://api.render.com/v1/services/${{ secrets.RENDER_BACKEND_SERVICE_ID }}/deploys" \
            --header "accept: application/json" \
            --header "content-type: application/json" \
            --header "authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            --data '{"clearCache":"do_not_clear"}'

      - name: Deploy Frontend to Render
        run: |
          curl -s --request POST \
            --url "https://api.render.com/v1/services/${{ secrets.RENDER_FRONTEND_SERVICE_ID }}/deploys" \
            --header "accept: application/json" \
            --header "content-type: application/json" \
            --header "authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            --data '{"clearCache":"do_not_clear"}'

      - name: Deployment triggered
        run: echo "Deployment triggered on Render. Check https://dashboard.render.com for status."
