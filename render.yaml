services:

  # ── Backend (Express API) ───────────────────────────────
  - type: web
    name: memberhub-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: node src/index.cjs
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: memberhub-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: https://memberhub-frontend.onrender.com
      - key: LOG_LEVEL
        value: warn
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
      - key: MPESA_ENV
        value: sandbox
      - key: REDIS_HOST
        value: localhost
      - key: REDIS_PORT
        value: 6379

  # ── Frontend (React Static Site) ───────────────────────
  - type: web
    name: memberhub-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://memberhub-backend.onrender.com/api

# ── PostgreSQL Database ─────────────────────────────────
databases:
  - name: memberhub-db
    databaseName: memberhub
    plan: free
