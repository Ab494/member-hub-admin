server {
    listen 80;

    # Where the built React files are
    root /usr/share/nginx/html;
    index index.html;

    # This is the most important line for React Router.
    # When someone visits /members, Nginx looks for that file,
    # doesn't find it (it's a React route, not a real file),
    # and falls back to index.html — letting React handle routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets (images, fonts, js, css) for 1 year
    # The browser won't re-download them on every visit
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
